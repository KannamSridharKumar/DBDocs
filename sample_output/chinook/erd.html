const TYPE_COLORS = RAW.type_colors || {};
const TYPE_LABELS  = RAW.type_labels  || {};
let sidebarOpen = true;
let hiddenTables = new Set();

// ── Node dimensions ────────────────────────────────────────────────────────
const NODE_W    = 210;
const HDR_H     = 42;
const COL_H     = 25;
const DIV_H     = 5;
const EXTRA_H   = 18;
const FOOTER_H  = 26;
const NO_KEY_H  = 34;

function calcNodeHeight(node) {
  const cols   = node.columns || [];
  const pkCols = cols.filter(c => c.is_primary_key);
  const fkCols = cols.filter(c => c.is_foreign_key && !c.is_primary_key);
  const keyCount = pkCols.length + fkCols.length;
  if (keyCount === 0) return HDR_H + NO_KEY_H + FOOTER_H;
  const hasDivider = pkCols.length > 0 && fkCols.length > 0;
  const extraCount = (node.column_count || 0) - keyCount;
  return HDR_H
    + keyCount * COL_H
    + (hasDivider ? DIV_H : 0)
    + (extraCount > 0 ? EXTRA_H : 0)
    + FOOTER_H;
}

// ── HTML node template ─────────────────────────────────────────────────────
function buildNodeHtml(data) {
  const color     = TYPE_COLORS[data.table_type] || '#4f46e5';
  const typeLabel = TYPE_LABELS[data.table_type]  || '';
  const cols      = data.columns || [];
  const pkCols    = cols.filter(c => c.is_primary_key);
  const fkCols    = cols.filter(c => c.is_foreign_key && !c.is_primary_key);
  const extraCount = (data.column_count || 0) - pkCols.length - fkCols.length;

  const colRow = (c, cls) => {
    const icon      = cls === 'pk' ? '🔑' : '🔗';
    const shortType = (c.type || '').split('(')[0].toUpperCase().replace('CHARACTER VARYING','VARCHAR').slice(0, 12);
    return `<div class="cy-col ${cls}">
      <span class="cy-col-icon">${icon}</span>
      <span class="cy-col-name" title="${c.name}">${c.name}</span>
      <span class="cy-col-type">${shortType}</span>
    </div>`;
  };

  const pkHtml  = pkCols.map(c => colRow(c, 'pk')).join('');
  const fkHtml  = fkCols.map(c => colRow(c, 'fk')).join('');
  const divider = (pkHtml && fkHtml) ? '<div class="cy-section-divider"></div>' : '';
  const bodyHtml = (pkHtml || fkHtml)
    ? pkHtml + divider + fkHtml
    : '<div class="cy-no-keys">No PK / FK columns</div>';
  const extraHtml = extraCount > 0
    ? `<div class="cy-extra">+${extraCount} more columns</div>` : '';

  return `<div class="cy-card" style="--accent:${color}">
    <div class="cy-header">
      <span class="cy-title" title="${data.name}">${data.name}</span>
      ${typeLabel ? `<span class="cy-type-badge">${typeLabel}</span>` : ''}
    </div>
    <div class="cy-body">${bodyHtml}${extraHtml}</div>
    <div class="cy-footer">
      <span>${(data.row_count || 0).toLocaleString()} rows</span>
      <span>${data.column_count} cols</span>
    </div>
  </div>`;
}

// ── Theme ──────────────────────────────────────────────────────────────────
function isDarkMode() { return !document.body.classList.contains('light'); }

function toggleTheme() {
  document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isDarkMode() ? '🌙' : '☀️';
  localStorage.setItem('dbdocs_theme', isDarkMode() ? 'dark' : 'light');
  if (cy) cy.style().fromJson(buildCyStyle()).update();
}
(function () {
  const t = localStorage.getItem('dbdocs_theme') || 'dark';
  if (t === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();

// ── Cytoscape style ────────────────────────────────────────────────────────
function buildCyStyle() {
  const dark = isDarkMode();
  return [
    {
      selector: 'node',
      style: {
        'label':            '',           // HTML label plugin draws the card
        'background-color': 'transparent',
        'border-width':     0,
        'shape':            'rectangle',
        'width':            NODE_W,
        'height':           'data(nodeHeight)',
        'padding':          0,
      }
    },
    {
      selector: 'node:selected',
      style: {
        'border-color': '#7c3aed',
        'border-width': 2,
        'border-opacity': 1,
      }
    },
    {
      selector: 'edge',
      style: {
        'width':                2,
        'line-color':           dark ? '#1e3a5f' : '#bfdbfe',
        'target-arrow-color':   dark ? '#3b82f6' : '#2563eb',
        'target-arrow-shape':   'vee',
        'arrow-scale':          1.1,
        'curve-style':          'bezier',
        'label':                'data(cardinality)',
        'font-size':            9,
        'font-weight':          '600',
        'color':                dark ? '#475569' : '#94a3b8',
        'font-family':          'Inter, sans-serif',
        'text-background-color':    dark ? '#060b18' : '#eef0f5',
        'text-background-opacity':  0.9,
        'text-background-padding':  '3px',
        'text-background-shape':    'round-rectangle',
      }
    },
    {
      selector: 'edge:selected',
      style: {
        'line-color':         '#7c3aed',
        'target-arrow-color': '#7c3aed',
        'width':              2.5,
      }
    },
    {
      selector: 'edge.inferred-edge',
      style: {
        'line-style':           'dashed',
        'line-dash-pattern':    [6, 4],
        'line-color':           dark ? '#1e3a5f' : '#bfdbfe',
        'target-arrow-color':   dark ? '#3b82f6' : '#2563eb',
        'opacity':              0.65,
      }
    },
    {
      selector: '.highlighted',
      style: {
        'border-color': '#7c3aed',
        'border-width': 2.5,
      }
    },
    {
      selector: '.faded',
      style: { 'opacity': 0.15 }
    },
  ];
}

// ── Build Cytoscape elements ───────────────────────────────────────────────
const elements = [
  ...RAW.nodes.map(n => ({
    data: {
      id:           n.id,
      name:         n.name || n.id || n.label,
      schema:       n.schema,
      row_count:    n.row_count,
      column_count: n.column_count,
      table_type:   n.table_type,
      columns:      n.columns,
      nodeHeight:   calcNodeHeight(n),
    }
  })),
  ...RAW.edges.map(e => ({
    data: {
      id:          e.id,
      source:      e.source,
      target:      e.target,
      source_col:  e.source_col,
      target_col:  e.target_col,
      label:       e.label,
      cardinality: e.cardinality || 'N:1',
      inferred:    e.inferred || false,
    },
    classes: e.inferred ? 'inferred-edge' : ''
  }))
];

// ── Init Cytoscape ─────────────────────────────────────────────────────────
cytoscape.use(cytoscapeDagre);

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements,
  style: buildCyStyle(),
  layout: {
    name:     'dagre',
    rankDir:  'TB',
    nodeSep:  50,
    rankSep:  100,
    padding:  50,
  },
  minZoom: 0.08,
  maxZoom: 3,
  wheelSensitivity: 0.3,
});

// ── HTML label nodes ───────────────────────────────────────────────────────
cy.nodeHtmlLabel([{
  query:      'node',
  halign:     'center',
  valign:     'center',
  halignBox:  'center',
  valignBox:  'center',
  tpl: function (data) { return buildNodeHtml(data); }

cy.on('mouseout', 'edge', function (evt) {

      <div><div style="color:#4b5563;font-size:10px;margin-bottom:2px">Columns</div><div style="font-weight:700;font-size:13px">${d.column_count}</div></div>
      <div><div style="color:#4b5563;font-size:10px;margin-bottom:2px">Primary Keys</div><div style="font-weight:700;font-size:13px">${pks.length}</div></div>
      <div><div style="color:#4b5563;font-size:10px;margin-bottom:2px">Foreign Keys</div><div style="font-weight:700;font-size:13px">${fks.length}</div></div>
    </div>
    <div style="font-weight:600;margin-bottom:8px;font-size:10px;color:#4b5563;text-transform:uppercase;letter-spacing:0.06em">All Columns</div>
    ${cols.map(c => `
      <div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #111827">
        <span style="font-size:10px;width:13px;text-align:center;flex-shrink:0">${c.is_primary_key ? '🔑' : c.is_foreign_key ? '🔗' : '·'}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:10.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${c.is_primary_key ? '#fcd34d' : c.is_foreign_key ? '#a5b4fc' : '#cbd5e1'}">${c.name}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#60a5fa;flex-shrink:0">${(c.type||'').split('(')[0].toUpperCase().slice(0,10)}</span>
      </div>`).join('')}
    <div style="margin-top:12px">
      <a href="data_dictionary.html#table_${RAW.nodes.findIndex(n => n.name === d.name)}"
         style="color:#7c3aed;font-size:11px;font-weight:500">→ Open in Data Dictionary</a>
    </div>`;

  // Highlight neighbourhood
  cy.elements().removeClass('highlighted faded');
  evt.target.addClass('highlighted');
  evt.target.neighborhood().addClass('highlighted');
  cy.elements().not(evt.target.union(evt.target.neighborhood())).addClass('faded');
});

cy.on('tap', function (evt) {
  if (evt.target === cy) {
    cy.elements().removeClass('highlighted faded');
    document.getElementById('detailPanel').style.display = 'none';
  }
});

// ── Sidebar table list ─────────────────────────────────────────────────────
function buildTableList() {
  const el = document.getElementById('tableListEl');
  el.innerHTML = '';
  RAW.nodes.forEach((n, i) => {
    const color = TYPE_COLORS[n.table_type] || '#4f46e5';
    const div   = document.createElement('div');
    div.className = 'tbl-item';
    div.id = 'tblitem_' + i;
    div.dataset.name = n.name.toLowerCase();
    div.innerHTML = `
      <input type="checkbox" class="tbl-checkbox" checked
             onclick="toggleTableVisibility('${n.name}', this.checked); event.stopPropagation()"/>
      <span class="tbl-dot" style="background:${color}"></span>
      <span class="tbl-label" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px" title="${n.name}">${n.name}</span>
      <span style="font-size:10px;color:#374151">${(n.row_count||0).toLocaleString()}</span>`;
    div.querySelector('.tbl-label').addEventListener('click', () => {
      const node = cy.$('#' + n.name);
      node.select();
      cy.animate({ fit: { eles: node, padding: 80 }, duration: 400, easing: 'ease-in-out-quad' });
    });
    el.appendChild(div);
  });
}

function filterTables(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.tbl-item').forEach(el => {
    el.style.display = (!q || el.dataset.name.includes(q)) ? '' : 'none';
  });
}

function toggleTableVisibility(tableName, visible) {
  const node = cy.$('#' + tableName);
  node.style('display', visible ? 'element' : 'none');
  if (visible) hiddenTables.delete(tableName);
  else         hiddenTables.add(tableName);
}

function selectAllTables(show) {
  document.querySelectorAll('.tbl-item input[type=checkbox]').forEach(cb => cb.checked = show);
  RAW.nodes.forEach(n => toggleTableVisibility(n.name, show));
}

// ── Legend ─────────────────────────────────────────────────────────────────
function buildLegend() {
  const legend  = document.getElementById('legend');
  const typeSet = new Set(RAW.nodes.map(n => n.table_type).filter(t => t && t !== 'unknown'));
  legend.innerHTML = '';
  typeSet.forEach(type => {
    const color = TYPE_COLORS[type] || '#4f46e5';
    const label = TYPE_LABELS[type] || type;
    const item  = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-dot" style="background:${color}"></div>${label}`;
    legend.appendChild(item);
  });
  const keys = document.createElement('div');
  keys.className = 'leg-item';
  keys.innerHTML = '🔑 PK &nbsp; 🔗 FK';
  legend.appendChild(keys);

  const hasInferred = RAW.edges.some(e => e.inferred);
  if (hasInferred) {
    const inf = document.createElement('div');
    inf.className = 'leg-item';
    inf.innerHTML = '<span style="display:inline-block;width:18px;height:2px;border-top:2px dashed #3b82f6;vertical-align:middle;margin-right:4px;opacity:0.7"></span>Inferred FK';
    legend.appendChild(inf);
  }
}

// ── Layout ─────────────────────────────────────────────────────────────────
function changeLayout(name) {
  cy.layout({
    name, padding: 50, nodeSep: 50, rankSep: 100,
    rankDir: 'TB', animate: true, animationDuration: 450,
    animationEasing: 'ease-in-out-quad',
  }).run();
}

// ── Sidebar toggle ─────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb  = document.getElementById('sidebar');
  const tog = document.getElementById('sidebarToggle');
  const nav = document.getElementById('navLinks');
  const leg = document.getElementById('legend');
  const offset = sidebarOpen ? '248px' : '0';
  sb.style.transform  = sidebarOpen ? '' : 'translateX(-248px)';
  tog.style.left      = sidebarOpen ? '248px' : '0';
  tog.textContent     = sidebarOpen ? '◀' : '▶';
  nav.style.left      = sidebarOpen ? '258px' : '10px';
  leg.style.left      = sidebarOpen ? '258px' : '10px';
}

// ── Export PNG ─────────────────────────────────────────────────────────────
function exportPng() {
  const png = cy.png({ output: 'blob', scale: 2, bg: isDarkMode() ? '#060b18' : '#eef0f5' });
  const a   = document.createElement('a');
  a.href    = URL.createObjectURL(png);
  a.download = 'chinook_erd.png';
  a.click();
}

// ── Init ───────────────────────────────────────────────────────────────────
buildTableList();
buildLegend();
cy.fit(undefined, 50);
</script>
</body>
