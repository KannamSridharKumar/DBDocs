}

function filterType(type) {
  currentTypeFilter = type;
  document.querySelectorAll('.type-filter-btn').forEach(b => {
    const active = b.dataset.type === type;
    b.className = `type-filter-btn text-xs px-2 py-0.5 rounded ${active ? 'bg-purple-700 text-white' : 'btn-s'}`;
  });
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('sidebarSearch').value.toLowerCase();
  filteredTables = tables.filter(t => {
    const matchQ = !q || t.name.toLowerCase().includes(q);
    const matchType = !currentTypeFilter || t.table_type === currentTypeFilter;
    return matchQ && matchType;
  });
  renderSidebar();
}

document.getElementById('sidebarSearch').addEventListener('input', applyFilters);

  if (score == null) return '';
  const n = Math.round(score);
  let emoji, bg, fg;
  if      (n >= 80) { emoji = '🟢'; bg = '#14532d'; fg = '#4ade80'; }
  else if (n >= 60) { emoji = '🟡'; bg = '#1c3a0a'; fg = '#a3e635'; }
  else if (n >= 40) { emoji = '🟠'; bg = '#451a03'; fg = '#fb923c'; }
  else              { emoji = '🔴'; bg = '#450a0a'; fg = '#f87171'; }
  return `<span style="flex-shrink:0;display:inline-flex;align-items:center;padding:1px 5px;border-radius:9999px;font-size:12px;background:${bg};color:${fg}" title="LLM confidence: ${n}/100">${emoji}</span>`;
}

      const piiTag = (c.pii_type||c.pii_detected) ? `<span class="pii-badge">${escHtml(c.pii_type||c.pii_detected)}</span>` : '';
      colRows += `
        <tr class="col-row tr-hover border-b bdr" data-name="${escHtml(c.name)}" data-type="${escHtml(c.type)}">
          <td class="px-3 py-2 text-center text-xs text-gray-500">${ci+1}</td>
          <td class="px-3 py-2">
            <div class="flex items-center gap-1 flex-wrap">
              <span class="font-mono text-sm font-medium">${escHtml(c.name)}</span>
              ${namingIssue}
            </div>
            <div class="flex flex-wrap gap-1 mt-0.5">${tags}</div>
          </td>
          <td class="px-3 py-2 font-mono text-xs text-blue-300">${escHtml(c.type)}</td>
          <td class="px-3 py-2 text-center text-xs">${c.nullable===false?'<span class="text-red-400">✗</span>':'<span class="text-gray-500">✓</span>'}</td>
          <td class="px-3 py-2">
            <div class="flex flex-wrap gap-1">
              ${c.is_primary_key?'<span class="pk-badge">PK</span>':''}
              ${c.is_foreign_key?`<span class="fk-badge tooltip" data-tip="→ ${escHtml(c.foreign_key_to||'')}">FK</span>`:''}
              ${c.nullable===false?'<span class="nn-badge">NN</span>':''}
              ${piiTag}
            </div>
          </td>
          <td class="px-3 py-2 text-xs text-gray-400 font-mono">${c.default!=null?escHtml(String(c.default)):''}</td>
          <td class="px-3 py-2 text-xs text-gray-400">
            <div class="flex items-start gap-1.5">
              <span class="flex-1">${c.llm_description?escHtml(c.llm_description):(c.comment?`<span class="text-gray-500">${escHtml(c.comment)}</span>`:'')}</span>
              ${c.llm_confidence!=null ? confBadge(c.llm_confidence) : ''}
            </div>
          </td>
        </tr>`;
    });

    const colTable = `
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="th">
              <th class="px-3 py-2 text-left text-xs font-medium w-8">#</th>
              <th class="px-3 py-2 text-left text-xs font-medium">Column</th>
              <th class="px-3 py-2 text-left text-xs font-medium">Type</th>
              <th class="px-3 py-2 text-center text-xs font-medium">Null</th>
              <th class="px-3 py-2 text-left text-xs font-medium">Flags</th>
              <th class="px-3 py-2 text-left text-xs font-medium">Default</th>
              <th class="px-3 py-2 text-left text-xs font-medium">Description</th>
            </tr>
          </thead>
          <tbody>${colRows}</tbody>
        </table>
      </div>`;

    // Collapsible sections
    let extraSections = '';

    // FK Integrity
    if ((t.fk_integrity||[]).length > 0) {
      const rows = t.fk_integrity.map(f => {
        const statusColor = f.status==='ok' ? 'text-green-400' : f.status==='violation' ? 'text-red-400' : 'text-yellow-400';
        return `<tr class="border-b bdr">
          <td class="px-3 py-1.5 text-xs font-mono">${escHtml(f.local_col)}</td>
          <td class="px-3 py-1.5 text-xs font-mono">${escHtml(f.ref_table)}.${escHtml(f.ref_col)}</td>
          <td class="px-3 py-1.5 text-xs text-right ${statusColor}">${f.orphan_count >= 0 ? f.orphan_count.toLocaleString() : 'err'}</td>
          <td class="px-3 py-1.5 text-xs ${statusColor} font-medium">${f.status}</td>
        </tr>`;
      }).join('');
      extraSections += `
        <div class="border-t bdr">
          <button onclick="toggleSection(this)" class="w-full px-5 py-2.5 text-left text-sm font-medium flex items-center justify-between sect-hover transition-colors">
            <span>🔗 FK Integrity (${t.fk_integrity.length})</span><span class="chevron text-gray-500">▶</span>
          </button>
          <div class="section-content hidden">
            <table class="w-full text-sm mb-2">
              <thead><tr class="th"><th class="px-3 py-1.5 text-xs font-medium">Local Col</th><th class="px-3 py-1.5 text-xs font-medium">References</th><th class="px-3 py-1.5 text-xs font-medium text-right">Orphans</th><th class="px-3 py-1.5 text-xs font-medium">Status</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }

    // Indexes
    if ((t.indexes||[]).length > 0) {
      const rows = t.indexes.map(ix => `<tr class="border-b bdr">
        <td class="px-3 py-1.5 text-xs font-mono">${escHtml(ix.name||'')}</td>
        <td class="px-3 py-1.5 text-xs">${(ix.columns||[]).join(', ')}</td>
        <td class="px-3 py-1.5 text-xs text-center">${ix.unique?'<span class="idx-badge">UNIQUE</span>':''}</td>
      </tr>`).join('');
      extraSections += `
        <div class="border-t bdr">
          <button onclick="toggleSection(this)" class="w-full px-5 py-2.5 text-left text-sm font-medium flex items-center justify-between sect-hover transition-colors">
            <span>📑 Indexes (${t.indexes.length})</span><span class="chevron text-gray-500">▶</span>
          </button>
          <div class="section-content hidden">
            <table class="w-full text-sm mb-2">
              <thead><tr class="th"><th class="px-3 py-1.5 text-xs font-medium">Name</th><th class="px-3 py-1.5 text-xs font-medium">Columns</th><th class="px-3 py-1.5 text-xs font-medium text-center">Unique</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }

    // Sample data
    if (t.sample_data && t.sample_data.length > 0) {
      const cols = Object.keys(t.sample_data[0]);
      const headers = cols.map(c => `<th class="px-3 py-1.5 text-xs font-medium font-mono">${escHtml(c)}</th>`).join('');
      const dataRows = t.sample_data.slice(0,5).map(row => 
        `<tr class="border-b bdr">${cols.map(c => `<td class="px-3 py-1.5 text-xs font-mono text-gray-400">${escHtml(String(row[c]??''))}</td>`).join('')}</tr>`
      ).join('');
      extraSections += `
        <div class="border-t bdr">
          <button onclick="toggleSection(this)" class="w-full px-5 py-2.5 text-left text-sm font-medium flex items-center justify-between sect-hover transition-colors">
            <span>🗂 Sample Data (${t.sample_data.length} rows)</span><span class="chevron text-gray-500">▶</span>
          </button>
          <div class="section-content hidden overflow-x-auto">
            <table class="w-full text-sm mb-2">
              <thead><tr class="th">${headers}</tr></thead>
              <tbody>${dataRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    card.innerHTML = headerHtml + descHtml + sqlHtml + colTable + extraSections;
    container.appendChild(card);
  });
}

// ── Interactions ─────────────────────────────────────────────────────────────
function toggleSection(btn) {
  const content = btn.nextElementSibling;
  const chevron = btn.querySelector('.chevron');
  const hidden = content.classList.toggle('hidden');
  chevron.textContent = hidden ? '▶' : '▼';
}

function toggleSql(idx) {
  const panel = document.getElementById('sql_' + idx);
  panel.classList.toggle('hidden');
}

const sqlSnippets = {};
function showSnippet(idx, tab) {
  const t = tables[idx];
  const pre = document.getElementById('snippet_' + idx);
  const tabs = document.querySelectorAll(`#sql_${idx} .snippet-tab`);
  tabs.forEach(b => {
    const active = b.dataset.tab === tab;
    b.className = `snippet-tab text-xs px-2 py-1 rounded ${active ? 'bg-purple-700 text-white' : 'btn-s'}`;
  });
  if (tab === 'create') {
    pre.textContent = `CREATE TABLE ${t.name} (\n${t.columns.map(c => `  ${c.name} ${c.type}${c.nullable===false?' NOT NULL':''}`).join(',\n')}\n);`;
  } else {
    pre.textContent = `SELECT\n  ${t.columns.slice(0,10).map(c=>c.name).join(',\n  ')}\nFROM ${t.name}\nLIMIT 100;`;
  }
}

function copySnippet(idx) {
  const text = document.getElementById('snippet_' + idx).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('SQL copied!'));
}

function copyColumns(idx) {
  const t = tables[idx];
  const text = t.columns.map(c => c.name).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Columns copied!'));
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#7c3aed;color:white;padding:8px 16px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.2s;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

function printPage() {
  window.print();
}

// ── Active table tracking via IntersectionObserver ───────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const idx = parseInt(e.target.id.split('_')[1]);
      document.querySelectorAll('#tableList > div').forEach(el => el.classList.remove('active-table'));
      const sb = document.getElementById('sb_' + idx);
      if (sb) { sb.classList.add('active-table'); sb.scrollIntoView({ block:'nearest' }); }
      activeIdx = filteredTables.indexOf(tables[idx]);
    }
  });
}, { threshold: 0.1, rootMargin: '-10% 0px -80% 0px' });

function scrollToTable(idx) {
  const el = document.getElementById('table_' + idx);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const si = document.getElementById('sidebarSearch');
  const ci = document.getElementById('colSearch');
  if (document.activeElement === si || document.activeElement === ci) {
    if (e.key === 'Escape') { si.value=''; ci.value=''; si.blur(); ci.blur(); applyFilters(); document.querySelectorAll('.col-row').forEach(r => r.style.display=''); }
    return;
  }
  if (e.key === '/') { e.preventDefault(); si.focus(); si.select(); }
  else if (e.key === 'j') {
    const next = Math.min(activeIdx+1, filteredTables.length-1);
    scrollToTable(tables.indexOf(filteredTables[next]));
  } else if (e.key === 'k') {
    const prev = Math.max(activeIdx-1, 0);
    scrollToTable(tables.indexOf(filteredTables[prev]));
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────
renderTables();
renderSidebar();
tables.forEach((t, i) => {
  const el = document.getElementById('table_' + i);
  if (el) observer.observe(el);
});
</script>
