// Theme
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark');
  html.classList.toggle('dark', !isDark);
  html.classList.toggle('light', isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('dbdocs_theme', isDark ? 'light' : 'dark');
}
(function(){
  const t = localStorage.getItem('dbdocs_theme') || 'dark';
  document.documentElement.classList.toggle('dark', t==='dark');
  document.documentElement.classList.toggle('light', t==='light');
  if (t==='light') document.getElementById('themeBtn').textContent = '☀️';
})();

function qualityClass(q) {
  if (q >= 90) return 'quality-excellent';
  if (q >= 75) return 'quality-good';
  if (q >= 50) return 'quality-fair';
  return 'quality-poor';
}

function qualityColor(q) {
  if (q >= 90) return '#22c55e';
  if (q >= 75) return '#84cc16';
  if (q >= 50) return '#f59e0b';
  return '#ef4444';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n,d=1) { return n==null?'–':Number(n).toFixed(d); }
function fmtN(n) { return n==null?'–':Number(n).toLocaleString(); }

// Quality gauge SVG
function gaugeSvg(score) {
  const color = qualityColor(score);
  const pct = score / 100;
  const R = 30, cx = 40, cy = 40;
  const startAngle = -Math.PI * 0.75, sweep = Math.PI * 1.5;
  const endAngle = startAngle + sweep * pct;
  const x1 = cx + R * Math.cos(startAngle), y1 = cy + R * Math.sin(startAngle);
  const x2 = cx + R * Math.cos(endAngle), y2 = cy + R * Math.sin(endAngle);
  const largeArc = pct > 0.5 ? 1 : 0;
  return `<svg width="80" height="80" viewBox="0 0 80 80">
    <path d="M${cx + R*Math.cos(startAngle)},${cy + R*Math.sin(startAngle)} A${R},${R} 0 1 1 ${cx + R*Math.cos(startAngle+sweep*0.999)},${cy + R*Math.sin(startAngle+sweep*0.999)}" fill="none" stroke="#374151" stroke-width="6" stroke-linecap="round"/>
    ${pct > 0.01 ? `<path d="M${x1},${y1} A${R},${R} 0 ${largeArc} 1 ${x2},${y2}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"/>` : ''}
    <text x="40" y="44" text-anchor="middle" fill="${color}" font-size="14" font-weight="700" font-family="Inter">${score.toFixed(0)}</text>
  </svg>`;
}

// Sparkbar
function sparkBar(pct, color='#7c3aed') {
  return `<div class="sparkbar-bg w-full"><div style="width:${Math.min(100,pct||0)}%;height:6px;background:${color};border-radius:2px"></div></div>`;
}

              <div><span class="text-gray-500">Q25</span><br><span class="font-mono">${fmt(c.q25,2)}</span></div>
              <div><span class="text-gray-500">Q75</span><br><span class="font-mono">${fmt(c.q75,2)}</span></div>
              ${c.outlier_count > 0 ? `<div><span class="text-yellow-500">Outliers</span><br><span class="font-mono">${fmtN(c.outlier_count)} (${fmt(c.outlier_pct)}%)</span></div>` : ''}
            </div>
          </div>` : ''}
          ${hasTopValues ? `
          <div>
            <div class="text-xs text-gray-500 mb-1">Top Values</div>
            <div style="height:${Math.min(160, c.top_values.length*22+20)}px"><canvas id="tv_${chartId}"></canvas></div>
          </div>` : ''}
          ${isDate ? `
          <div class="text-xs space-y-1">
            <div class="text-gray-500 font-medium">Date Range</div>
            <div><span class="text-gray-500">Min:</span> <span class="font-mono">${esc(String(c.min_date))}</span></div>
            <div><span class="text-gray-500">Max:</span> <span class="font-mono">${esc(String(c.max_date))}</span></div>
          </div>` : ''}
          ${c.min_length != null ? `
          <div class="text-xs space-y-1">
            <div class="text-gray-500 font-medium">String Length</div>
            <div><span class="text-gray-500">Min:</span> ${c.min_length} · <span class="text-gray-500">Max:</span> ${c.max_length} · <span class="text-gray-500">Avg:</span> ${fmt(c.avg_length,1)}</div>
          </div>` : ''}
        </div>
      </div>` : ''}
    </div>`;
}

function toggleColDetail(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  const wasHidden = panel.classList.toggle('hidden');
  if (!wasHidden) drawCharts(id);
}

function toggleCard(ti) {
  const body = document.getElementById('cardBody_' + ti);
  const ch = document.getElementById('chevron_' + ti);
  const hidden = body.classList.toggle('hidden');
  ch.textContent = hidden ? '▶' : '▼';
}

// Chart rendering
const chartInstances = {};

function drawCharts(panelId) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  // Find the table and column by matching panel id pattern chart_{tableName}_{colIdx}
  const parts = panelId.split('_');
  // panelId format: "chart_{tableName}_{ti}_{ci}"
  // We need to find the right column data
  // We stored column data with data attributes - let's re-find from the column index
  const col = panel._colData;
  if (!col) return;

  const cId = 'c_' + panelId;
  const tvId = 'tv_' + panelId;

  if (col.histogram && col.histogram.length > 0 && document.getElementById(cId) && !chartInstances[cId]) {
    const isDark = document.documentElement.classList.contains('dark');
    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    chartInstances[cId] = new Chart(document.getElementById(cId), {
      type: 'bar',
      data: {
        labels: col.histogram.map(b => String(b.bin)),
        datasets: [{ data: col.histogram.map(b => b.count), backgroundColor: '#7c3aed99', borderColor: '#7c3aed', borderWidth: 1 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{maxRotation:45,font:{size:9}},grid:{color:gridColor}},y:{ticks:{font:{size:9}},grid:{color:gridColor}}} }
    });
  }
  if (col.top_values && col.top_values.length > 0 && document.getElementById(tvId) && !chartInstances[tvId]) {
    const isDark = document.documentElement.classList.contains('dark');
    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    const vals = col.top_values.slice(0, 10);
    chartInstances[tvId] = new Chart(document.getElementById(tvId), {
      type: 'bar',
      data: {
        labels: vals.map(v => String(v.value).substring(0,20)),
        datasets: [{ data: vals.map(v => v.count), backgroundColor: '#6366f199', borderColor: '#6366f1', borderWidth: 1 }]
      },
      options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:9}},grid:{color:gridColor}},y:{ticks:{font:{size:9}},grid:{color:gridColor}}} }
    });
  }
}

function drawTrendChart(canvasId, trendData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !trendData || !trendData.by_period) return;
  const isDark = document.documentElement.classList.contains('dark');
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
  new Chart(canvas, {
    type: 'line',
    data: {
      labels: trendData.by_period.map(d => d.period),
      datasets: [{ data: trendData.by_period.map(d => d.count), borderColor:'#7c3aed', backgroundColor:'rgba(124,58,237,0.1)', fill:true, tension:0.3, pointRadius:2 }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{maxRotation:45,font:{size:9}},grid:{color:gridColor}},y:{ticks:{font:{size:9}},grid:{color:gridColor}}} }
  });
}

// Table filter
document.getElementById('tableSearch').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.table-card').forEach(card => {
    card.style.display = !q || card.dataset.name.includes(q) ? '' : 'none';
  });
});

// After render, attach _colData to each detail panel
function attachColData() {
  tables.forEach((t, ti) => {
    t.columns.forEach((c, ci) => {
      const panelId = 'chart_' + t.name + '_' + ti + '_' + ci;
      const panel = document.getElementById(panelId);
      if (panel) panel._colData = c;
    });
  });
}

// Re-render with correct chart IDs
function renderTablesFixed() {
  const container = document.getElementById('tablesContainer');
  container.innerHTML = '';
  tables.forEach((t, ti) => {
    const issues = (t.issues||[]);
    const fkViols = (t.fk_integrity||[]).filter(f => f.status==='violation');
    const hasTrend = t.trend_data && t.trend_data.by_period && t.trend_data.by_period.length > 1;
    const trendChartId = 'trend_' + ti;
    const qColor = qualityColor(t.quality_score);

    const card = document.createElement('div');
    card.className = 'card rounded-xl border overflow-hidden table-card';
    card.dataset.name = t.name.toLowerCase();
    card.id = 'tbl_' + ti;

    let colsHtml = t.columns.map((c, ci) => {
      const chartId = 'chart_' + t.name + '_' + ti + '_' + ci;
      const hasHistogram = c.histogram && c.histogram.length > 0;
      const hasTopValues = c.top_values && c.top_values.length > 0;
      const isDate = c.min_date || c.max_date;
      const hasChart = hasHistogram || hasTopValues || isDate;
      const piiTag = c.pii_detected ? `<span class="pii-badge">🔒 ${esc(c.pii_detected)}</span>` : '';
      const patternTag = c.detected_pattern ? `<span class="pattern-badge">${esc(c.detected_pattern)}</span>` : '';
      const outlierTag = (c.outlier_count > 0) ? `<span class="outlier-badge">⚡ ${fmtN(c.outlier_count)} outliers</span>` : '';
      const nullColor = c.null_pct > 50 ? '#ef4444' : c.null_pct > 20 ? '#f59e0b' : '#22c55e';
      const distColor = c.distinct_pct > 90 ? '#6366f1' : '#7c3aed';

      return `<div class="border-b border-gray-800/50">
        <div class="px-5 py-3 flex items-start gap-3 cursor-pointer hover:bg-gray-800/30 transition-colors" onclick="toggleColDetail2('${chartId}')">
          <div class="w-6 text-xs text-gray-600 pt-0.5 shrink-0">${ci+1}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1 flex-wrap">
              <span class="font-mono text-sm font-medium">${esc(c.name)}</span>
              <span class="text-xs text-blue-300 font-mono">${esc(c.dtype)}</span>
              ${c.is_unique?'<span class="text-xs text-purple-400">unique</span>':''}
              ${c.is_constant?'<span class="text-xs text-yellow-400">constant</span>':''}
              ${piiTag}${patternTag}${outlierTag}
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-1.5">
              <div><div class="text-xs text-gray-500">Null ${fmt(c.null_pct)}%</div>${sparkBar(c.null_pct, nullColor)}</div>
              <div><div class="text-xs text-gray-500">Distinct ${fmt(c.distinct_pct)}%</div>${sparkBar(c.distinct_pct, distColor)}</div>
              ${c.min_val!=null?`<div class="text-xs"><span class="text-gray-500">Min </span><span class="font-mono">${esc(String(c.min_val))}</span></div>`:''}
              ${c.max_val!=null?`<div class="text-xs"><span class="text-gray-500">Max </span><span class="font-mono">${esc(String(c.max_val))}</span></div>`:''}
            </div>
          </div>
          ${hasChart ? '<div class="text-xs text-gray-600 shrink-0 pt-0.5">▶</div>' : ''}
        </div>
        ${hasChart ? `<div id="${chartId}" class="hidden px-5 pb-4 pt-3 border-t border-gray-800/50 bg-gray-900/30">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${hasHistogram ? `<div>
              <div class="text-xs text-gray-500 mb-1">Distribution</div>
              <div style="height:120px"><canvas id="c_${chartId}"></canvas></div>
              <div class="grid grid-cols-3 gap-1 mt-2 text-xs text-center">
                <div><div class="text-gray-500">Mean</div><div class="font-mono">${fmt(c.mean_val,2)}</div></div>
                <div><div class="text-gray-500">Median</div><div class="font-mono">${fmt(c.median_val,2)}</div></div>
                <div><div class="text-gray-500">Std</div><div class="font-mono">${fmt(c.std_val,2)}</div></div>
                <div><div class="text-gray-500">Q25</div><div class="font-mono">${fmt(c.q25,2)}</div></div>
                <div><div class="text-gray-500">Q75</div><div class="font-mono">${fmt(c.q75,2)}</div></div>
                ${c.outlier_count>0?`<div><div class="text-yellow-500">Outliers</div><div class="font-mono">${fmtN(c.outlier_count)}</div></div>`:''}
              </div>
            </div>` : ''}
            ${hasTopValues ? `<div>
              <div class="text-xs text-gray-500 mb-1">Top Values</div>
              <div style="height:${Math.min(160, (c.top_values||[]).length*20+20)}px"><canvas id="tv_${chartId}"></canvas></div>
            </div>` : ''}
            ${isDate ? `<div class="text-xs space-y-1"><div class="text-gray-500 font-medium">Date Range</div><div><span class="text-gray-500">Min: </span><span class="font-mono">${esc(String(c.min_date))}</span></div><div><span class="text-gray-500">Max: </span><span class="font-mono">${esc(String(c.max_date))}</span></div></div>` : ''}
            ${c.min_length!=null?`<div class="text-xs space-y-1"><div class="text-gray-500 font-medium">String Length</div><div>Min: ${c.min_length} · Max: ${c.max_length} · Avg: ${fmt(c.avg_length,1)}</div></div>`:''}
          </div>
        </div>` : ''}
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="px-5 py-4 border-b border-gray-800 flex items-start gap-4" style="background:linear-gradient(135deg,${qColor}11,transparent)">
        <div>${gaugeSvg(t.quality_score)}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <h2 class="text-lg font-bold font-mono">${esc(t.name)}</h2>
            ${issues.length?`<span class="text-xs bg-red-900/40 text-red-300 px-2 py-0.5 rounded">${issues.length} issue${issues.length>1?'s':''}</span>`:''}
            ${fkViols.length?`<span class="text-xs bg-orange-900/40 text-orange-300 px-2 py-0.5 rounded">⚠ ${fkViols.length} FK violation${fkViols.length>1?'s':''}</span>`:''}
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2 text-sm">
            <div><span class="text-gray-500 text-xs">Rows</span><div class="font-semibold">${fmtN(t.row_count)}</div></div>
            <div><span class="text-gray-500 text-xs">Sampled</span><div class="font-semibold">${fmtN(t.sampled_rows)}</div></div>
            <div><span class="text-gray-500 text-xs">Null Rate</span><div class="font-semibold">${fmt(t.null_pct)}%</div></div>
            <div><span class="text-gray-500 text-xs">Dup Rate</span><div class="font-semibold">${fmt(t.duplicate_pct)}%</div></div>
          </div>
        </div>
        <button onclick="toggleCard(${ti})" class="shrink-0 text-gray-400 hover:text-gray-200 text-lg" id="chevron_${ti}">▼</button>
      </div>
      ${issues.length?`<div class="px-5 py-2 border-b border-gray-800 bg-red-950/20"><div class="text-xs font-medium text-red-400 mb-1">⚠ Quality Issues</div><ul class="list-disc list-inside space-y-0.5">${issues.map(i=>`<li class="text-xs text-red-300">${esc(i)}</li>`).join('')}</ul></div>`:''}
      <div id="cardBody_${ti}">
        ${hasTrend?`<div class="px-5 py-4 border-b border-gray-800"><div class="text-xs font-medium text-gray-400 mb-2">📈 Row Trend – ${esc(t.trend_data.column)}${t.trend_data.is_sampled?' <span class="text-yellow-500">[sampled]</span>':''}</div><div style="height:120px"><canvas id="${trendChartId}"></canvas></div></div>`:''}
        ${(t.fk_integrity||[]).length?`<div class="px-5 py-3 border-b border-gray-800"><div class="text-xs font-medium text-gray-400 mb-2">🔗 FK Integrity</div><div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="th"><th class="px-2 py-1.5 text-left font-medium">Local</th><th class="px-2 py-1.5 text-left font-medium">→ References</th><th class="px-2 py-1.5 text-right font-medium">Orphans</th><th class="px-2 py-1.5 text-left font-medium">Status</th></tr></thead><tbody>${(t.fk_integrity||[]).map(f=>`<tr class="border-b border-gray-800/50"><td class="px-2 py-1.5 font-mono">${esc(f.local_col)}</td><td class="px-2 py-1.5 font-mono text-blue-300">${esc(f.ref_table)}.${esc(f.ref_col)}</td><td class="px-2 py-1.5 text-right ${f.status==='ok'?'text-green-400':f.status==='violation'?'text-red-400':'text-yellow-400'}">${f.orphan_count>=0?fmtN(f.orphan_count):'err'}</td><td class="px-2 py-1.5 font-medium ${f.status==='ok'?'text-green-400':f.status==='violation'?'text-red-400':'text-yellow-400'}">${esc(f.status)}</td></tr>`).join('')}</tbody></table></div></div>`:''}
        <div class="divide-y divide-gray-800/50">${colsHtml}</div>
      </div>`;

    container.appendChild(card);
    if (hasTrend) setTimeout(() => drawTrendChart(trendChartId, t.trend_data), 50);
  });
}

function toggleColDetail2(chartId) {
  const panel = document.getElementById(chartId);
  if (!panel) return;
  const wasHidden = panel.classList.contains('hidden');
  panel.classList.toggle('hidden', !wasHidden);
  const btn = panel.previousElementSibling.querySelector('div:last-child');
  if (btn) btn.textContent = wasHidden ? '▼' : '▶';
  if (wasHidden) {
    // Find col data by chartId pattern: chart_{tableName}_{ti}_{ci}
    const parts = chartId.split('_');
    const ci = parseInt(parts[parts.length-1]);
    const ti = parseInt(parts[parts.length-2]);
    const col = tables[ti] && tables[ti].columns[ci];
    if (!col) return;
    const cId = 'c_' + chartId;
    const tvId = 'tv_' + chartId;
    const isDark = document.documentElement.classList.contains('dark');
    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    if (col.histogram && col.histogram.length > 0 && document.getElementById(cId) && !chartInstances[cId]) {
      chartInstances[cId] = new Chart(document.getElementById(cId), {
        type:'bar',
        data:{labels:col.histogram.map(b=>String(b.bin)),datasets:[{data:col.histogram.map(b=>b.count),backgroundColor:'#7c3aed99',borderColor:'#7c3aed',borderWidth:1}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:9}},grid:{color:gridColor}},y:{ticks:{font:{size:9}},grid:{color:gridColor}}}}
      });
    }
    if (col.top_values && col.top_values.length > 0 && document.getElementById(tvId) && !chartInstances[tvId]) {
      const vals = col.top_values.slice(0,10);
      chartInstances[tvId] = new Chart(document.getElementById(tvId), {
        type:'bar',
        data:{labels:vals.map(v=>String(v.value).substring(0,20)),datasets:[{data:vals.map(v=>v.count),backgroundColor:'#6366f199',borderColor:'#6366f1',borderWidth:1}]},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}},grid:{color:gridColor}},y:{ticks:{font:{size:9}},grid:{color:gridColor}}}}
      });
    }
  }
}

renderTablesFixed();
</script>
</body>
